          },
          {

        ],

            place: 'Universidad Rey Juan Carlos',

          }
        ],

        skills: [
          {

            value: 'Python, C#, Java, JavaScript, PHP, SQL'

            link: 'https://www.edu.xunta.gal/',
            date: '26/04/2016'
          }
        ]
      }

      /* ================= RENDER ================= */

      function createArticle(title, items, special = null) {
        const article = document.createElement('article')

        const header = document.createElement('header')
        header.textContent = title
        article.appendChild(header)

        const container = document.createElement('div')
        container.className = 'container'

        if (special === 'languages') {
          const item = document.createElement('div')
          item.className = 'item horizontal'

          items.forEach(l => {
            const span = document.createElement('span')
            span.textContent = l.name

            const bar = document.createElement('div')
            bar.className = 'p-bar'

            const fill = document.createElement('div')
            fill.style.width = l.level + '%'

            bar.appendChild(fill)
            item.append(span, bar)
          })

          container.appendChild(item)
        } else {
          items.forEach(i => {
            const div = document.createElement('div')
            div.className = 'item'

            const h = document.createElement('header')
            h.textContent = i.title

            const s1 = document.createElement('span')
            if (i.link) {
              const a = document.createElement('a')
              a.href = i.link
              a.target = '_blank'
              a.textContent = i.place
              s1.appendChild(a)
            } else {
              s1.textContent = i.place || i.value || ''
            }

            const s2 = document.createElement('span')
            s2.textContent = i.date || ''

            div.append(h, s1, s2)
            container.appendChild(div)
          })
        }

        article.appendChild(container)
        return article
      }

      function render() {
        // personal
        const p = document.getElementById('personal')
        p.innerHTML = `
    <h1>${cv.personal.name}</h1>
    <h3>${cv.personal.role}</h3>
    <div class="data-container">
      <span class="data" id="mail">${cv.personal.email}</span>
      <span class="data" id="phone">${cv.personal.phone}</span>
    </div>
    <a target="_blank" href="${cv.personal.linkedin}">linkedin</a>
    <a target="_blank" href="${cv.personal.github}">github</a>
  `

        const left = document.getElementById('left')
        left.appendChild(createArticle('Formación Profesional', cv.education))
        left.appendChild(
          createArticle('Experiencia Profesional', cv.experience)
        )
        left.appendChild(createArticle('Cursos', cv.courses))

        const right = document.getElementById('right')
        right.appendChild(createArticle('Competencias', cv.skills))
        right.appendChild(createArticle('Idiomas', cv.languages, 'languages'))
        right.appendChild(createArticle('Premios', cv.awards))
      }

      render()

      /* ================= ORIGINAL SCRIPTS ================= */

      const printBtn = document.getElementById('print')
      const page = document.getElementById('page')

      printBtn.addEventListener('click', async () => {
        printBtn.classList.add('hide')
        page.dataset.print = true
        document.body.dataset.print = true
        window.scrollTo(0, 0)

        await new Promise(r => setTimeout(r, 200))

        let opt = {
          filename: 'Curriculum_Iago_Pena_Lorenzo.pdf',
          image: { type: 'jpeg', quality: 1 },
          html2canvas: { dpi: 192, scale: 4 },
          jsPDF: { unit: 'mm', format: 'a4' }
        }

        await html2pdf().from(document.body).set(opt).save()

        printBtn.classList.remove('hide')
        page.dataset.print = false
        document.body.dataset.print = false
      })

      document.addEventListener('click', async e => {
        if (e.target.id === 'mail' || e.target.id === 'phone') {
          await navigator.clipboard.writeText(e.target.textContent)
        }
      })
    </script>
  </body>
</html>
